#
# Window Rules
#
# This file contains rules for specific windows.
# You can use these rules to set properties like floating, opacity, and size for individual windows.
#
# For more information, see the Hyprland wiki:
# https://wiki.hyprland.org/Configuring/Window-Rules/
#

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

windowrule = opacity 1 override 1, match:class firefox

layerrule = animation popin, match:namespace rofi
layerrule = dim_around on, match:namespace rofi

windowrule = float on, match:class nm-connection-editor
windowrule = opacity 1 override 1, match:class nm-connection-editor

windowrule = float on, match:class blueman-manager
windowrule = size 1200 800, match:class blueman-manager
windowrule = opacity 1 override 1, match:class blueman-manager


windowrule = opacity 1 override 1, match:title (.*)YouTube(.*)
windowrule = opacity 1 override 1, match:title (.*)Minecraft(.*)
windowrule = opacity 1 override 1, match:class gimp
